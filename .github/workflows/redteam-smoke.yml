name: Red Team - Smoke Suite (PR Gate)

on:
  pull_request:
    branches: [main]
    paths:
      - 'eva-foundation/33-eva-brain-v2/**'
      - 'eva-foundation/36-red-teaming/**'
      - '.github/workflows/redteam-smoke.yml'

env:
  EVA_ASK_URL: http://localhost:8000/api/chat
  EVA_HEADERS_JSON: '{"Content-Type":"application/json"}'

jobs:
  smoke-tests:
    name: Run Smoke Suite
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Promptfoo
        run: npm install -g promptfoo

      - name: Install Node dependencies
        working-directory: eva-foundation/36-red-teaming/eval/promptfoo
        run: npm ci

      - name: Run assertion unit tests
        working-directory: eva-foundation/36-red-teaming/eval/promptfoo
        run: npx vitest run --reporter=verbose

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Start EVA Backend (stub)
        run: |
          # TODO: Replace with actual backend start
          # For now, use a mock HTTP server
          echo "Starting mock backend..."
          python -m http.server 8000 &
          sleep 5

      - name: Wait for backend health
        run: |
          echo "Waiting for backend to be ready..."
          for i in {1..30}; do
            if curl -f http://localhost:8000/health 2>/dev/null; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Run smoke suite
        working-directory: eva-foundation/36-red-teaming
        run: |
          promptfoo eval -c eval/promptfoo/suites/smoke.yaml

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results-${{ github.run_id }}
          path: eva-foundation/36-red-teaming/eval/promptfoo/results/

      - name: Check results
        working-directory: eva-foundation/36-red-teaming
        run: |
          # Fail if any tests failed
          if grep -q '"pass": false' eval/promptfoo/results/smoke-output.json; then
            echo "::error::Smoke tests failed"
            exit 1
          fi
          echo "::notice::All smoke tests passed"

      - name: Comment PR with results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultsPath = 'eva-foundation/36-red-teaming/eval/promptfoo/results/smoke-output.json';
            
            if (!fs.existsSync(resultsPath)) {
              console.log('Results file not found');
              return;
            }
            
            const results = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
            const passed = results.results.filter(r => r.pass).length;
            const failed = results.results.filter(r => !r.pass).length;
            const total = results.results.length;
            const passRate = ((passed / total) * 100).toFixed(2);
            
            const emoji = failed === 0 ? '[PASS]' : '[FAIL]';
            const status = failed === 0 ? 'PASSED' : 'FAILED';
            
            const comment = `## ${emoji} Red Team Smoke Suite: ${status}

            **Results:**
            - Total Tests: ${total}
            - Passed: ${passed}
            - Failed: ${failed}
            - Pass Rate: ${passRate}%

            ${failed > 0 ? '[WARN] **Action Required:** Fix failing tests before merge.' : ''}

            <details>
            <summary>View Details</summary>

            ${results.results.filter(r => !r.pass).map(r => `- [FAIL] ${r.description}`).join('\n')}

            </details>`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
