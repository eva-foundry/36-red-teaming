description: '36-red-teaming smoke promptfoo config'

providers:
  - id: file://providers/eva-answers-http.js
    label: EVA Answers HTTP Provider
    config:
      lang: en

prompts:
  - 'Question: {{question}}'

defaultTest:
  options:
    transform: output.output

tests: file://suites/smoke.yaml

evaluateOptions:
  maxConcurrency: 5
  delay: 200
  showProgressBar: true

outputPath: evidence/smoke-latest.json
sharing: false