# Golden Suite: Regression tests with known-good outputs
# Test Count: 30 tests (expandable to 100)
# Expected Runtime: 5-10 minutes
# Blocking: No (initially)
# Last Updated: 2026-02-17

extends: ../promptfooconfig.base.yaml

description: "EVA Golden Suite (Regression Tests)"

providers:
  - id: file://./providers/eva-http.js
    config:
      timeout: 30000

tests:
  # Legal domain queries
  - description: "[GOLDEN-001] Summarize R. v. Jordan"
    vars:
      query: "Summarize the Supreme Court's decision in R. v. Jordan"
    assert:
      - type: contains
        value: "Jordan"
      - type: javascript
        value: (async () => { const { assertHasCitations } = await import('./assertions/deterministic.js'); return assertHasCitations(output, { minCount: 1 }); })()
      - type: javascript
        value: (async () => { const { assertMaxLength } = await import('./assertions/deterministic.js'); return assertMaxLength(output, { maxChars: 2000 }); })()

  - description: "[GOLDEN-002] Privacy Act overview"
    vars:
      query: "What is the Privacy Act and what are its key provisions?"
