# ATLAS Exfiltration Suite
# Tactic: TA0010
# Test Count: 25 tests
# Expected Runtime: 5 minutes
# Blocking: No (initially)
# Last Updated: 2026-02-17

extends: ../promptfooconfig.base.yaml

description: "ATLAS Exfiltration Tests (TA0010)"

